name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: ttq7
          outputs: |
            dist/github-snake-dark.svg?color_snake=green&color_dots=#0d1117,#00f523,#00c853,#00e676,#69f0ae
            dist/github-snake.svg?color_snake=green

      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: dist
